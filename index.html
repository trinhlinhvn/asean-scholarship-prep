<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>ASEAN Scholarship - Interview Prep</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;padding:10px}
.app{max-width:940px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden}
.hd{background:linear-gradient(135deg,rgba(15,32,39,.85),rgba(44,83,100,.85)),url('https://images.pexels.com/photos/777059/pexels-photo-777059.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;color:#fff;padding:28px 18px 20px;text-align:center;position:relative}
.hd::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e74c3c,#fff,#e74c3c)}
.hd h1{font-size:1.5em;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.hd p{opacity:.9;font-size:.85em;margin-top:3px}
.icons{display:flex;justify-content:center;gap:5px;margin:10px 0 6px}
.icons img{width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.7);object-fit:cover}
.pbar{background:rgba(255,255,255,.15);border-radius:8px;height:8px;margin-top:8px;overflow:hidden}
.pfill{background:linear-gradient(90deg,#00c9ff,#92fe9d);height:100%;border-radius:8px;transition:width .5s}
.ptxt{margin-top:4px;font-size:.75em;opacity:.85}
.tabs{display:flex;background:#f5f5f5;border-bottom:2px solid #e0e0e0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 12px;cursor:pointer;font-size:.72em;font-weight:600;color:#555;border-bottom:3px solid transparent;transition:all .3s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:#2c5364;background:#e0f2f1}
.tab.on{color:#2c5364;border-bottom-color:#2c5364;background:#fff}
.pg{padding:20px;display:none}
.pg.show{display:block}
.cd{background:#f8f9fa;border-radius:10px;padding:15px;margin-bottom:14px;border-left:4px solid #2c5364}
.cd h3{color:#0f2027;margin-bottom:6px;font-size:.98em}
.cd p,.cd li{color:#444;line-height:1.7;font-size:.88em}
.cd ul{padding-left:16px;margin-top:4px}
.qb{background:#fff8e1;border:1px solid #ffca28;border-radius:8px;padding:12px;margin:8px 0}
.qb strong{color:#e65100}
.ab{background:#e8f5e9;border:1px solid #4caf50;border-radius:8px;padding:12px;margin:6px 0;display:none}
.ab strong{color:#1b5e20}
.tb{background:#e3f2fd;border:1px solid #42a5f5;border-radius:8px;padding:12px;margin:6px 0}
.tb strong{color:#0d47a1}
.nb{background:#ede7f6;border:1px solid #7e57c2;border-radius:8px;padding:12px;margin:6px 0}
.nb strong{color:#311b92}
.eb{background:#fce4ec;border:1px solid #e91e63;border-radius:8px;padding:12px;margin:6px 0}
.eb strong{color:#880e4f}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8em;margin:3px;transition:all .3s}
.btn-o{background:#ff8f00;color:#fff}
.btn-g{background:#2e7d32;color:#fff}
.btn-b{background:#1565c0;color:#fff}
.btn-p{background:linear-gradient(135deg,#2c5364,#0f2027);color:#fff}
.ck{list-style:none;padding:5px 0}
.ck li{padding:7px 4px;border-bottom:1px solid #eee;cursor:pointer;font-size:.86em}
.ck li.d{color:#2e7d32;text-decoration:line-through}
.ck li::before{content:"☐ "}
.ck li.d::before{content:"☑ "}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68em;font-weight:700;margin-bottom:6px}
.b1{background:#bbdefb;color:#0d47a1}.b2{background:#fff9c4;color:#f57f17}.b3{background:#c8e6c9;color:#1b5e20}.bx{background:#f8bbd0;color:#880e4f}
.gal{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin:10px 0}
.gi{border-radius:8px;overflow:hidden;position:relative;height:75px}
.gi img{width:100%;height:100%;object-fit:cover}
.gi span{position:absolute;bottom:0;left:0;right:0;padding:8px 3px 2px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:.62em;font-weight:600;text-align:center}
.mm{background:#f0f4f8;border-radius:10px;padding:15px;margin:10px 0}
.mm h4{color:#1a237e;margin-bottom:6px;font-size:.92em}
.mm-item{display:inline-block;background:#fff;border:1px solid #90caf9;border-radius:15px;padding:4px 10px;margin:3px;font-size:.78em;color:#1565c0;font-weight:500}
.sec{margin-bottom:20px}
.sec h3{color:#0f2027;margin-bottom:6px;font-size:1.02em;border-bottom:2px solid #e0e0e0;padding-bottom:4px}
.sec p{color:#333;line-height:1.8;font-size:.88em;margin-bottom:6px}
.rlink{display:block;padding:9px 12px;margin:5px 0;background:#fafafa;border-radius:6px;border-left:3px solid #2c5364;text-decoration:none;color:#333;transition:all .3s;font-size:.85em}
.rlink:hover{background:#e0f2f1;transform:translateX(3px)}
.hr{border:none;border-top:1px dashed #ddd;margin:10px 0}
.hidden{display:none}
@media(max-width:768px){body{padding:5px}.hd{padding:18px 12px 14px}.hd h1{font-size:1.2em}.pg{padding:13px}.cd{padding:12px}}
@media(max-width:400px){.tab{padding:7px 8px;font-size:.66em}.pg{padding:9px}.btn{width:100%;margin:3px 0}}
</style>
</head>
<body>
<div class="app">
<div class="hd">
<h1>🇸🇬 ASEAN Scholarship Interview Prep</h1>
<p>Dành cho học sinh lớp 8-9 ASEAN &bull; Phỏng vấn tự nhiên &bull; 3 tuần chuẩn bị</p>
<div class="icons">
<img src="https://images.pexels.com/photos/777059/pexels-photo-777059.jpeg?auto=compress&cs=tinysrgb&w=80" alt="MBS">
<img src="https://images.pexels.com/photos/2804038/pexels-photo-2804038.jpeg?auto=compress&cs=tinysrgb&w=80" alt="SG">
<img src="https://images.unsplash.com/photo-1506351421178-63b52a2d2562?w=80&q=80" alt="Gardens">
<img src="https://images.unsplash.com/photo-1565967511849-76a60a516170?w=80&q=80" alt="Night">
</div>
<div class="pbar"><div class="pfill" id="pf" style="width:0%"></div></div>
<div class="ptxt" id="pt">0/10 rounds</div>
</div>
<div class="tabs" id="tabs"></div>
<div class="pg" id="pg0"></div>
<div class="pg" id="pg1"></div>
<div class="pg" id="pg2"></div>
<div class="pg" id="pg3"></div>
<div class="pg" id="pg4"></div>
<div class="pg" id="pg5"></div>
<div class="pg" id="pg6"></div>
</div>
<script>
// ========== TABS CONFIG ==========
const TABS=[
{id:'pg0',label:'📘 Rounds',icon:''},
{id:'pg1',label:'🗺️ Mindmap',icon:''},
{id:'pg2',label:'🇸🇬 Singapore',icon:''},
{id:'pg3',label:'🎯 Skills',icon:''},
{id:'pg4',label:'💪 Health',icon:''},
{id:'pg5',label:'🧠 Soft Skills',icon:''},
{id:'pg6',label:'📚 Resources',icon:''}
];
let curTab='pg0',curMod=0;
let done=JSON.parse(localStorage.getItem('ad')||'[]');
let cks=JSON.parse(localStorage.getItem('ac')||'{}');

function init(){renderTabs();showTab('pg0');updProg();}

function renderTabs(){
document.getElementById('tabs').innerHTML=TABS.map(t=>
`<div class="tab ${curTab===t.id?'on':''}" onclick="showTab('${t.id}')">${t.label}</div>`
).join('');
}

function showTab(id){
curTab=id;renderTabs();
document.querySelectorAll('.pg').forEach(p=>p.classList.remove('show'));
document.getElementById(id).classList.add('show');
if(id==='pg0')renderRounds();
else if(id==='pg1')renderMindmap();
else if(id==='pg2')renderSG();
else if(id==='pg3')renderSkills();
else if(id==='pg4')renderHealth();
else if(id==='pg5')renderSoft();
else if(id==='pg6')renderRes();
}

function updProg(){
let p=(done.length/10)*100;
document.getElementById('pf').style.width=p+'%';
document.getElementById('pt').textContent=`${done.length}/10 rounds (${Math.round(p)}%)`;
}
function tog(id){const e=document.getElementById(id);e.style.display=e.style.display==='block'?'none':'block';}
function chk(k,el){el.classList.toggle('d');cks[k]=el.classList.contains('d');localStorage.setItem('ac',JSON.stringify(cks));}
function fin(i){if(!done.includes(i)){done.push(i);localStorage.setItem('ad',JSON.stringify(done));}updProg();renderRounds();}

// ========== 10 ROUNDS ==========
const M=[
{id:1,w:1,t:"Self-Introduction",s:"Trò chuyện tự nhiên về bản thân trong 2 phút",
k:["Kể như đang nói chuyện với thầy cô, không đọc thuộc","Nêu tên, trường, sở thích, 1 điều tự hào","Kết nối với lý do muốn học ở Singapore","Giữ 1.5-2 phút, tự nhiên, có cảm xúc"],
q:[
{q:"Tell me about yourself.",a:"Kể tự nhiên: Tên → Trường → Điều yêu thích nhất ở trường → 1 hoạt động ngoài giờ → Tại sao muốn sang Singapore. Ví dụ: 'Hi, I'm [Tên] from [Thành phố]. I'm in grade [8/9] at [Trường]. I really love [môn/hoạt động] because [lý do chân thật]. Outside school, I [hoạt động]. I'm excited about Singapore because [lý do cụ thể].'",tip:"Hãy tưởng tượng bạn đang giới thiệu mình với thầy Hiệu trưởng mới - thân thiện nhưng lễ phép. ĐỪNG học thuộc lòng, hãy NHỚ ý chính và kể bằng lời của mình.",n:"Thầy Hiệu trưởng SJI muốn gặp một học sinh THẬT, không phải robot. Cười tự nhiên, nói chậm, có thể dừng suy nghĩ - đó là bình thường."},
{q:"What do you like to do in your free time?",a:"Kể thật: đọc sách, chơi thể thao, vẽ, code, nấu ăn... Quan trọng là nói TẠI SAO thích và bạn đã HỌC ĐƯỢC GÌ từ nó.",tip:"Đừng bịa sở thích 'sang'. Thích xem YouTube về khoa học cũng hay - miễn là bạn có thể nói say mê về nó.",n:"Nếu thầy hỏi thêm chi tiết, đó là dấu hiệu TỐT - họ đang interested. Cứ kể thoải mái như kể cho bạn thân."}
],ck:["Đã kể về mình 5 lần khác nhau (không giống nhau)","Đã nhờ bố mẹ/thầy cô nghe và góp ý","Tự tin nói 2 phút không cần giấy"]},

{id:2,w:1,t:"Why Singapore",s:"Tại sao muốn du học Singapore - nói từ trái tim",
k:["Singapore: an toàn, sạch sẽ, giáo dục top thế giới","Học bằng tiếng Anh + môi trường đa văn hóa","Gần Việt Nam (2 giờ bay), dễ về thăm nhà","Học bổng ASEAN: học phí + sinh hoạt phí + vé máy bay miễn phí"],
q:[
{q:"Why do you want to study in Singapore?",a:"Nói thật từ trái tim: 'I want to study in Singapore because [lý do thật: muốn giỏi tiếng Anh, thích môi trường quốc tế, muốn thử sống tự lập, ngưỡng mộ giáo dục SG]. I also like that Singapore is close to Vietnam so I can visit my family.'",tip:"Thầy Hiệu trưởng muốn nghe lý do THẬT, không phải lý do 'đúng mẫu'. 'I want to make my parents proud' hay 'I'm curious about living in another country' đều OK.",n:"Đây là cuộc trò chuyện, không phải bài thi. Nếu chưa biết nhiều về SG, thành thật nói: 'I haven't been there yet, but I've read that...'"},
{q:"What do you know about this school?",a:"Research trước: Biết tên trường (VD: St. Joseph's Institution - SJI), năm thành lập, đặc điểm nổi bật. 'I know [School] is known for [đặc điểm]. I'm interested in [cụ thể: sports, arts, science program].'",tip:"Không cần biết MỌI THỨ. Biết 2-3 điều cụ thể và nói tại sao điều đó hấp dẫn bạn là đủ.",n:"Nếu không biết câu trả lời, nói: 'I'm not sure about that, but I'd love to learn more.' Trung thực luôn tốt hơn bịa."}
],ck:["Đã research về trường sẽ phỏng vấn","Biết 3 lý do thật sự muốn đi Singapore","Có thể nói tự nhiên về mong muốn của mình"]},

{id:3,w:1,t:"About Your Family & School",s:"Kể về gia đình, trường lớp - cho thầy cô biết bạn là ai",
k:["Gia đình: bố mẹ làm gì, anh chị em, ai ảnh hưởng bạn nhiều nhất","Trường: bạn học trường nào, thích gì ở trường, thành tích","Bạn bè: có bạn thân không, các hoạt động nhóm","Thầy cô: ai truyền cảm hứng cho bạn"],
q:[
{q:"Tell me about your family.",a:"Kể tự nhiên: 'My family has [số] people. My dad works as [nghề] and my mom [nghề]. I have [anh/chị/em]. We like to [hoạt động gia đình]. My [người] inspires me because [lý do].' Không cần phải giàu hay hoàn hảo - chân thật là đẹp nhất.",tip:"Thầy hỏi để hiểu background và xem bạn có support system không. Gia đình bình thường, yêu thương nhau là điểm cộng lớn.",n:"Kể như đang giới thiệu gia đình cho một người lớn tử tế - tự hào nhưng khiêm tốn."},
{q:"What is your favorite subject? Why?",a:"Chọn môn THẬT SỰ thích. 'I love [Môn] because [lý do cụ thể]. For example, last semester I [trải nghiệm cụ thể]. It makes me curious about [liên quan].'",tip:"Không cần là môn điểm cao nhất. Thích Lịch sử vì 'những câu chuyện thú vị' cũng perfectly fine cho học sinh lớp 8-9.",n:"Nói với sự hào hứng tự nhiên. Mắt sáng lên khi nói về điều mình thích - panel sẽ thấy và thích điều đó."}
],ck:["Có thể kể về gia đình bằng tiếng Anh thoải mái","Chuẩn bị câu chuyện về môn yêu thích","Biết nói về trường và thầy cô yêu quý"]},

{id:4,w:1,t:"Hobbies & Activities",s:"Sở thích, hoạt động ngoại khóa - cho thấy bạn đa dạng",
k:["Hoạt động ngoại khóa: CLB, thể thao, nghệ thuật, tình nguyện","Không cần nhiều - 1-2 hoạt động làm lâu dài có giá trị hơn 10 hoạt động thử qua","Cho thấy bạn biết quản lý thời gian: học + chơi cân bằng","Kỹ năng từ hoạt động: teamwork, kiên nhẫn, sáng tạo"],
q:[
{q:"What activities do you do outside of school?",a:"Kể 2-3 hoạt động yêu thích: 'After school, I usually [hoạt động 1]. On weekends, I [hoạt động 2]. I also joined [CLB/nhóm] where I [vai trò/trải nghiệm].' Nêu cụ thể bạn đã làm gì và học được gì.",tip:"Chơi game cũng OK nếu bạn nói được bạn học gì từ nó (strategy, teamwork, English). Quan trọng là tự nhận thức.",n:"Kể với năng lượng tích cực. Thầy muốn thấy một học sinh sống động, có đời sống ngoài sách vở."},
{q:"Have you ever worked in a team? Tell me about it.",a:"Kể 1 lần làm việc nhóm: 'In [context], I worked with [bao nhiêu] classmates on [project]. My role was [vai trò]. The challenge was [khó khăn]. We solved it by [cách giải quyết]. I learned that [bài học].'",tip:"Không cần là project to. Làm poster nhóm, tập thể dục đội, hay chuẩn bị tiết mục văn nghệ đều là teamwork.",n:"Kể như đang chia sẻ kỷ niệm vui - tự nhiên, có cảm xúc. Cười khi nhớ lại moment hay."}
],ck:["Liệt kê được 3 hoạt động với chi tiết cụ thể","Có 1 câu chuyện teamwork hay","Nói được bài học rút ra từ mỗi hoạt động"]},

{id:5,w:2,t:"Living Independently",s:"Cho thấy bạn sẵn sàng sống xa nhà",
k:["14-15 tuổi sống xa nhà là thử thách lớn - thầy cần biết bạn handle được","Kỹ năng cần: tự giặt đồ, quản lý tiền, đúng giờ, tự học","Homesickness là bình thường - có plan đối phó là tốt","Cho thấy maturity: biết nhờ giúp khi cần, không cố chịu một mình"],
q:[
{q:"How will you handle living away from your family?",a:"Thành thật + có plan: 'I know I'll miss my family, especially [cụ thể]. But I've thought about it - I'll call home every [tần suất], join school activities to make friends, and focus on my studies. I've also [trải nghiệm tự lập đã có: đi camp, ở nhà 1 mình, tự nấu ăn...].'",tip:"ĐỪNG nói 'I won't miss home' - không ai tin. Nói 'I'll miss home AND I have a plan' cho thấy mature.",n:"Thầy Hiệu trưởng lo cho học sinh của mình. Họ muốn chắc bạn sẽ ổn, không khóc suốt ngày. Cho thấy bạn đã suy nghĩ nghiêm túc."},
{q:"Can you take care of yourself? Give an example.",a:"Kể ví dụ thật: 'Yes, I already [ví dụ: wake up by myself, do my own laundry, cook simple meals, manage my study schedule]. Last [time], I [trải nghiệm tự lập cụ thể]. It wasn't perfect, but I learned [bài học].'",tip:"Bắt đầu tập NGAY: tự dậy sớm, tự gấp quần áo, tự nấu 1 bữa/tuần. Để có chuyện THẬT kể.",n:"Kể vui vẻ, không khoe khoang. 'I burned my first fried egg but now I can cook a decent one!' - humor tự nhiên rất thu hút."}
],ck:["Đã thử sống tự lập 1 tuần (tự dậy, tự giặt, tự học)","Có plan cụ thể khi nhớ nhà","Có ít nhất 2 ví dụ thật về self-care"]},

{id:6,w:2,t:"Goals & Dreams",s:"Ước mơ và mục tiêu - không cần hoàn hảo, cần chân thật",
k:["Ở tuổi 14-15, chưa biết rõ tương lai là BÌNH THƯỜNG","Quan trọng: có direction (hướng đi), không cần exact plan","Kết nối: Singapore giúp gì cho mục tiêu của bạn?","Cho thấy growth mindset: muốn học hỏi, thử thách bản thân"],
q:[
{q:"What do you want to be in the future?",a:"Thành thật về mức độ chắc chắn: 'I'm interested in [lĩnh vực] because [lý do]. I'm not 100% sure yet - I'm still exploring. But I know I want to [mục tiêu rộng: help people, create things, solve problems]. Studying in Singapore will help me discover more about [gì].'",tip:"'I don't know exactly yet, but I'm excited to find out' tốt hơn 1000 lần so với 'I want to be a doctor' mà không giải thích được tại sao.",n:"Nói về tương lai với sự tò mò và hào hứng, không phải áp lực. Bạn 14 tuổi - được phép explore!"},
{q:"What do you hope to gain from studying in Singapore?",a:"Ngoài kiến thức: 'I hope to improve my English, make friends from different countries, learn to be independent, and [mục tiêu cá nhân]. I think experiencing a different education system will open my mind to new ways of thinking.'",tip:"Panel thích câu trả lời cho thấy bạn muốn GROWTH (phát triển), không chỉ GRADES (điểm số).",n:"Nói từ trái tim. Bạn thật sự muốn gì? Đó là câu trả lời đúng nhất."}

function renderSG(){
document.getElementById('pg2').innerHTML=`
<h2 style="color:#0f2027;margin-bottom:10px">🇸🇬 All About Singapore</h2>
<p style="color:#666;font-size:.85em;margin-bottom:15px">History, people, education - everything to know before your interview (in English)</p>

<div class="sec"><h3>📜 History: From Fishing Village to World Leader</h3>
<p><strong>Ancient times:</strong> Singapore was known as "Singapura" (Lion City) in the 14th century. It was a small trading post in the Malay Archipelago.</p>
<p><strong>1819 - British arrival:</strong> Sir Stamford Raffles established Singapore as a British trading port. Its strategic location between India and China made it a vital stop on trade routes.</p>
<p><strong>1942-1945 - Japanese Occupation:</strong> World War II brought devastating Japanese occupation. This traumatic period shaped Singapore's determination to never be vulnerable again.</p>
<p><strong>1959 - Self-governance:</strong> Lee Kuan Yew became the first Prime Minister. His People's Action Party (PAP) began transforming Singapore.</p>
<p><strong>1963-1965 - Merger and Separation:</strong> Singapore briefly joined Malaysia (1963) but separated on August 9, 1965 due to political differences. Independence was NOT planned - Lee Kuan Yew cried on national TV. The new nation had no natural resources, no army, and uncertain future.</p>
<p><strong>1965-1990 - The Miracle:</strong> Under Lee Kuan Yew's leadership, Singapore transformed through:</p>
<ul>
<li>Massive investment in education - building schools, training teachers, English as main language</li>
<li>Anti-corruption campaigns - zero tolerance policy</li>
<li>Public housing (HDB) - 80% of citizens own their homes</li>
<li>Attracting foreign investment through rule of law and stability</li>
<li>Building world-class infrastructure: Changi Airport, Port of Singapore</li>
</ul>
<p><strong>1990-present:</strong> Continued growth into global financial center, tech hub, and education powerhouse. Today Singapore is one of the richest countries per capita in the world.</p>
</div>

<div class="sec"><h3>💰 Why Singapore is a Global Finance & Tech Center</h3>
<p><strong>Financial Hub:</strong></p>
<ul>
<li>3rd largest financial center in the world (after New York and London)</li>
<li>Headquarters for 4,200+ multinational companies in Asia-Pacific</li>
<li>Strong rule of law, low corruption, transparent regulations</li>
<li>Low tax rates attract global businesses</li>
<li>Stable government and political security</li>
</ul>
<p><strong>Technology Hub:</strong></p>
<ul>
<li>Smart Nation initiative: AI, IoT, digital government services</li>
<li>Home to Google, Facebook, ByteDance, Grab regional offices</li>
<li>World's fastest internet and most connected country</li>
<li>Strong IP protection encourages innovation</li>
<li>Government invests heavily in R&D and startups</li>
</ul>
<p><strong>Key insight for interview:</strong> Singapore achieved all this in just 60 years - through EDUCATION. That's why they invest in scholarships - they believe talented young people are the best investment.</p>
</div>

<div class="sec"><h3>🎓 Why Students Love Studying in Singapore</h3>
<ul>
<li><strong>World #1 education:</strong> Top of PISA rankings in Math, Science, Reading</li>
<li><strong>English-medium:</strong> All subjects taught in English - perfect for building global skills</li>
<li><strong>Safe & clean:</strong> One of the safest countries in the world for young students</li>
<li><strong>Close to home:</strong> Only 2-hour flight from Vietnam - can visit family during holidays</li>
<li><strong>Multicultural:</strong> Friends from China, India, Malaysia, Indonesia + local Singaporeans</li>
<li><strong>Modern facilities:</strong> Libraries, sports complexes, labs, technology in every classroom</li>
<li><strong>Career opportunities:</strong> After graduation, work in a global business hub</li>
<li><strong>Affordable with scholarship:</strong> ASEAN Scholarship covers EVERYTHING - tuition, living, flights</li>
</ul>
</div>

<div class="sec"><h3>📋 ASEAN Scholarship - What You Need to Know</h3>
<p><strong>Who:</strong> Students from ASEAN countries (Vietnam, Indonesia, Thailand, Philippines, etc.) in Grade 8-9</p>
<p><strong>What:</strong> Full scholarship to study Secondary 3 to Pre-University 2 (4 years) at top Singapore schools</p>
<p><strong>Schools:</strong> St. Joseph's Institution (SJI), Raffles Institution (RI), Hwa Chong Institution (HC), etc.</p>
<p><strong>Covers:</strong> Tuition fees + living allowance + hostel + annual return flights to Vietnam</p>
<p><strong>Selection process:</strong></p>
<ul>
<li>Step 1: Written application + school transcripts</li>
<li>Step 2: Selection test (English, Math, IQ/aptitude)</li>
<li>Step 3: Interview with school Principal/Vice-Principal (THIS is what we're preparing for!)</li>
<li>Step 4: Medical checkup (must pass health screening)</li>
<li>Step 5: Offer letter → Prepare to move to Singapore!</li>
</ul>
<p><strong>The interview:</strong> A friendly 15-20 minute conversation with the school's Principal and/or Vice-Principal. They want to know YOU as a person - your character, curiosity, and readiness to live independently. It's NOT a test with right/wrong answers.</p>
</div>

<div class="sec"><h3>🏫 Daily Life at a Singapore School</h3>
<ul>
<li><strong>Morning:</strong> Assembly at 7:30am, classes until 2pm</li>
<li><strong>Afternoon:</strong> CCAs (Co-Curricular Activities) - sports, arts, clubs - 2-3 times/week</li>
<li><strong>Evening:</strong> Self-study, homework, hang out with hostel friends</li>
<li><strong>Food:</strong> School canteen (cheap, diverse: Chinese, Malay, Indian, Western)</li>
<li><strong>Weekends:</strong> Explore Singapore, study, go to library, meet friends, sports</li>
<li><strong>Holidays:</strong> Go home to Vietnam, or travel with friends</li>
</ul>
</div>

<div class="cd" style="border-left-color:#ff8f00;background:#fff3e0">
<h3>💡 For Your Interview</h3>
<p>You DON'T need to memorize all these facts. Just know enough to show genuine interest. If asked "What do you know about Singapore?", pick 2-3 things that genuinely interest YOU and talk about them with curiosity.</p>
</div>`;
}

<p style="color:#666;font-size:.85em;margin-bottom:15px">Kỹ năng trò chuyện TỰ NHIÊN - phù hợp cho học sinh lớp 8-9 phỏng vấn với thầy Hiệu trưởng</p>

<div class="cd" style="border-left-color:#e91e63;background:#fce4ec">
<h3>⚠️ Quan trọng nhất</h3>
<p>Phỏng vấn ASEAN KHÔNG giống phỏng vấn xin việc. Đây là cuộc trò chuyện giữa thầy Hiệu trưởng (SJI, RI, HC) với một học sinh 14-15 tuổi. Thầy muốn biết: <strong>"Em có phải là một học sinh tốt, tò mò, và sẵn sàng để phát triển không?"</strong> Chỉ cần BẠN LÀ CHÍNH MÌNH - phiên bản tốt nhất.</p>
</div>

<div class="cd"><h3>1. 🗣️ Nói chuyện như đang chat với thầy/cô giáo tốt bụng</h3>
<ul>
<li><strong>Tone:</strong> Lễ phép nhưng thoải mái. Không quá formal, không quá casual</li>
<li><strong>Speed:</strong> Chậm hơn bình thường 1 chút. Khi nervous ta hay nói nhanh</li>
<li><strong>Volume:</strong> Đủ to để nghe rõ, không cần hét</li>
<li><strong>Practice:</strong> Tưởng tượng bạn đang kể chuyện cho cô giáo tiếng Anh mà bạn thích nhất</li>
</ul></div>

<div class="cd"><h3>2. 👀 Body Language đơn giản</h3>
<ul>
<li><strong>Mắt:</strong> Nhìn người nói, thỉnh thoảng nhìn sang chỗ khác (tự nhiên, không stare)</li>
<li><strong>Mặt:</strong> Mỉm cười khi chào, khi nói về điều thích. Không cần cười suốt</li>
<li><strong>Tay:</strong> Để trên bàn hoặc trên đùi. Dùng tay nhẹ khi giải thích (tự nhiên)</li>
<li><strong>Ngồi:</strong> Thẳng lưng, hơi nghiêng về phía trước (cho thấy interested)</li>
<li><strong>Đừng:</strong> Khoanh tay, gãi đầu, lắc ghế, nhìn xuống suốt</li>
</ul></div>

<div class="cd"><h3>3. 🧠 Khi không biết trả lời</h3>
<ul>
<li>"That's interesting, let me think for a moment..." (rồi suy nghĩ 5 giây)</li>
<li>"I haven't thought about that before, but I think..." (rồi try)</li>
<li>"I'm not sure about the exact answer, but from what I know..." </li>
<li>"Could you explain what you mean by [từ khó]?" (hỏi lại nếu không hiểu)</li>
</ul>
<p style="margin-top:8px"><strong>Nhớ:</strong> Thầy Hiệu trưởng BIẾT bạn 14 tuổi. Họ KHÔNG expect bạn biết mọi thứ. Trung thực + cố gắng suy nghĩ = pass.</p></div>

<div class="cd"><h3>4. 📖 Storytelling - Kể chuyện hay hơn liệt kê</h3>
<ul>
<li><strong>Thay vì:</strong> "I like reading, swimming, and studying" (boring)</li>
<li><strong>Hãy nói:</strong> "I got into reading last year when my friend lent me [book]. I couldn't stop - I finished it in 2 days! Now I read about [topic] because..." (interesting!)</li>
<li><strong>Key:</strong> 1 story cụ thể luôn hay hơn 5 facts chung chung</li>
<li><strong>Formula:</strong> When → What happened → How I felt → What I learned</li>
</ul></div>

<div class="cd"><h3>5. ❤️ Chân thật > Hoàn hảo</h3>
<ul>
<li>Nói về weakness thật (không phải "I'm too hardworking")</li>
<li>Thừa nhận khi chưa biết ("I'm still learning about...")</li>
<li>Chia sẻ cảm xúc thật ("I was nervous at first but...")</li>
<li>Panel đã nghe hàng trăm câu trả lời "perfect" - họ NHẬN RA ngay đâu là thật, đâu là giả</li>
</ul></div>

<div class="cd"><h3>6. 🎬 Pre-Interview (10 phút trước)</h3>
<ul>
<li>Đi vệ sinh, uống nước</li>
<li>Hít thở sâu 3 lần (hít 4 giây, giữ 4 giây, thở ra 4 giây)</li>
<li>Tự nhủ: "Mình đã chuẩn bị tốt. Mình chỉ cần là chính mình."</li>
<li>Mỉm cười trước gương 10 giây (trick não bộ cảm thấy tự tin)</li>
<li>Walk in: đứng thẳng, mỉm cười, chào to rõ "Good morning!"</li>
</ul></div>`;
}

<p style="color:#666;font-size:.85em;margin-bottom:15px">Kỹ năng mềm, thích ứng VUCA/BANI, tự học & AI tools cho học tập</p>

<ul>
<li>Thế giới thay đổi rất nhanh - nghề nghiệp hôm nay có thể biến mất ngày mai</li>
<li>Kỹ năng quan trọng nhất: <strong>HỌC CÁCH HỌC</strong> (learn how to learn)</li>
<li>Flexible > Fixed mindset. Adaptable > Perfect</li>
<li>Singapore education đang dạy theo hướng này - bạn sẽ fit in nhanh nếu có mindset đúng</li>
</ul></div>

<div class="cd"><h3>🎯 10 Kỹ năng mềm quan trọng nhất</h3>
<ul>
<li><strong>1. Communication:</strong> Nói rõ ràng, lắng nghe tốt, viết mạch lạc</li>
<li><strong>2. Critical Thinking:</strong> Đặt câu hỏi "Tại sao?", không tin mù quáng</li>
<li><strong>3. Adaptability:</strong> Thay đổi kế hoạch khi cần, không panic</li>
<li><strong>4. Self-management:</strong> Quản lý thời gian, emotion, energy</li>
<li><strong>5. Collaboration:</strong> Làm việc nhóm, respect ý kiến khác</li>
<li><strong>6. Creativity:</strong> Nghĩ khác, thử cách mới, không sợ sai</li>
<li><strong>7. Digital literacy:</strong> Sử dụng tech hiệu quả, phân biệt thật/giả</li>
<li><strong>8. Resilience:</strong> Gặp khó không bỏ cuộc, bounce back</li>
<li><strong>9. Empathy:</strong> Hiểu cảm xúc người khác, đặt mình vào vị trí họ</li>
<li><strong>10. Growth mindset:</strong> Tin rằng mình CÓ THỂ phát triển với nỗ lực</li>
</ul></div>

<div class="cd"><h3>📚 Kỹ năng tự học (Self-Learning)</h3>
<ul>
<li><strong>Pomodoro Technique:</strong> Học 25 phút → Nghỉ 5 phút → Lặp lại. Sau 4 rounds nghỉ 15-30 phút</li>
<li><strong>Active Recall:</strong> Đọc xong → đóng sách → tự nhớ lại → kiểm tra. Hiệu quả gấp 3 lần đọc lại</li>
<li><strong>Spaced Repetition:</strong> Ôn lại sau 1 ngày, 3 ngày, 1 tuần, 1 tháng</li>
<li><strong>Note-taking:</strong> Cornell method hoặc Mind mapping</li>
<li><strong>Teach others:</strong> Giải thích cho người khác = hiểu sâu nhất</li>
<li><strong>Set goals:</strong> Mỗi ngày 1-3 mục tiêu nhỏ, track progress</li>
</ul></div>

<div class="cd"><h3>🤖 AI Tools hỗ trợ học tập</h3>
<ul>
<li><strong>ChatGPT / Claude:</strong> Hỏi giải thích concepts, practice English conversation, brainstorm ideas</li>
<li><strong>ELSA Speak:</strong> Luyện phát âm tiếng Anh với AI feedback real-time</li>
<li><strong>Quizlet:</strong> Tạo flashcards, ôn vocabulary với spaced repetition</li>
<li><strong>Notion AI:</strong> Organize notes, create study plans</li>
<li><strong>Google Translate + Grammarly:</strong> Hỗ trợ viết tiếng Anh đúng ngữ pháp</li>
<li><strong>Khan Academy:</strong> Học Math, Science miễn phí bằng tiếng Anh</li>
<li><strong>YouTube (x1.5 speed):</strong> Xem bài giảng, documentary, English content</li>
</ul>
<p style="margin-top:8px"><strong>⚠️ Lưu ý:</strong> AI là CÔNG CỤ hỗ trợ, không phải thay thế việc tự suy nghĩ. Dùng AI để HIỂU, không phải để COPY.</p></div>

<div class="cd"><h3>🌏 Kỹ năng thích ứng khi sang Singapore</h3>
<ul>
<li><strong>Culture adaptation:</strong> Open mind, try new food, respect differences</li>
<li><strong>Language switch:</strong> Think in English, not translate from Vietnamese</li>
<li><strong>Independence:</strong> Budget money, do laundry, wake up on time</li>
<li><strong>Social skills:</strong> Make friends from different countries, join CCAs</li>
<li><strong>Stress management:</strong> Exercise, talk to someone, maintain routine</li>
<li><strong>Ask for help:</strong> Teachers, counselors, senior scholars - DON'T suffer alone</li>
</ul></div>

<div class="cd" style="border-left-color:#ff8f00;background:#fff3e0">

</div>`;
}
