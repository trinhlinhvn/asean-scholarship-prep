<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);min-height:100vh;padding:10px}
.app{max-width:940px;margin:0 auto;background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.4);overflow:hidden}
.hd{background:linear-gradient(135deg,rgba(15,32,39,.85),rgba(44,83,100,.85)),url('https://images.pexels.com/photos/777059/pexels-photo-777059.jpeg?auto=compress&cs=tinysrgb&w=1200') center/cover;color:#fff;padding:28px 18px 18px;text-align:center;position:relative}

.hd h1{font-size:1.5em;text-shadow:0 2px 8px rgba(0,0,0,.4)}
.hd p{opacity:.9;font-size:.85em;margin-top:3px}
.icons{display:flex;justify-content:center;gap:5px;margin:10px 0 6px}

.lang-sel{margin-top:10px;display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.lang-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 10px;border-radius:14px;font-size:.72em;cursor:pointer;font-weight:600;transition:all .2s}
.lang-btn:hover{background:rgba(255,255,255,.3)}
.lang-btn.on{background:rgba(255,255,255,.9);color:#0f2027}
.pbar{background:rgba(255,255,255,.15);border-radius:8px;height:8px;margin-top:10px;overflow:hidden}
.pfill{background:linear-gradient(90deg,#00c9ff,#92fe9d);height:100%;border-radius:8px;transition:width .5s}
.ptxt{margin-top:4px;font-size:.75em;opacity:.85}
.tabs{display:flex;background:#f5f5f5;border-bottom:2px solid #e0e0e0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 12px;cursor:pointer;font-size:.72em;font-weight:600;color:#555;border-bottom:3px solid transparent;transition:all .3s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:#2c5364;background:#e0f2f1}
.tab.on{color:#2c5364;border-bottom-color:#2c5364;background:#fff}
.pg{padding:20px;display:none}
.pg.show{display:block}
.cd{background:#f8f9fa;border-radius:10px;padding:15px;margin-bottom:14px;border-left:4px solid #2c5364}
.cd h3{color:#0f2027;margin-bottom:6px;font-size:.98em}
.cd p,.cd li{color:#444;line-height:1.7;font-size:.88em}
.cd ul{padding-left:16px;margin-top:4px}
.qb{background:#fff8e1;border:1px solid #ffca28;border-radius:8px;padding:12px;margin:8px 0}
.qb strong{color:#e65100}
.ab{background:#e8f5e9;border:1px solid #4caf50;border-radius:8px;padding:12px;margin:6px 0;display:none}
.ab strong{color:#1b5e20}
.tb{background:#e3f2fd;border:1px solid #42a5f5;border-radius:8px;padding:12px;margin:6px 0}
.tb strong{color:#0d47a1}
.nb{background:#ede7f6;border:1px solid #7e57c2;border-radius:8px;padding:12px;margin:6px 0}
.nb strong{color:#311b92}
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8em;margin:3px;transition:all .3s}
.btn-o{background:#ff8f00;color:#fff}
.btn-g{background:#2e7d32;color:#fff}
.btn-b{background:#1565c0;color:#fff}
.btn-p{background:linear-gradient(135deg,#2c5364,#0f2027);color:#fff}
.ck{list-style:none;padding:5px 0}
.ck li{padding:7px 4px;border-bottom:1px solid #eee;cursor:pointer;font-size:.86em}
.ck li.d{color:#2e7d32;text-decoration:line-through}
.ck li::before{content:"☐ "}
.ck li.d::before{content:"☑ "}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68em;font-weight:700;margin-bottom:6px}
.b1{background:#bbdefb;color:#0d47a1}.b2{background:#fff9c4;color:#f57f17}.b3{background:#c8e6c9;color:#1b5e20}.bx{background:#f8bbd0;color:#880e4f}
.mm{background:#f0f4f8;border-radius:10px;padding:15px;margin:10px 0}
.mm h4{color:#1a237e;margin-bottom:6px;font-size:.92em}
.mm-item{display:inline-block;background:#fff;border:1px solid #90caf9;border-radius:15px;padding:4px 10px;margin:3px;font-size:.78em;color:#1565c0;font-weight:500}
.sec{margin-bottom:20px}
.sec h3{color:#0f2027;margin-bottom:6px;font-size:1.02em;border-bottom:2px solid #e0e0e0;padding-bottom:4px}
.sec p{color:#333;line-height:1.8;font-size:.88em;margin-bottom:6px}
.rlink{display:block;padding:9px 12px;margin:5px 0;background:#fafafa;border-radius:6px;border-left:3px solid #2c5364;text-decoration:none;color:#333;transition:all .3s;font-size:.85em}
.rlink:hover{background:#e0f2f1;transform:translateX(3px)}
.rlink .rt{font-weight:600;color:#0f2027;display:block;margin-bottom:2px}
.rlink .rd{font-size:.78em;color:#666}
.hr{border:none;border-top:1px dashed #ddd;margin:10px 0}
.hidden{display:none}
@media(max-width:768px){body{padding:5px}.hd{padding:18px 12px 14px}.hd h1{font-size:1.2em}.pg{padding:13px}.cd{padding:12px}.lang-btn{padding:3px 8px;font-size:.68em}}
@media(max-width:400px){.tab{padding:7px 8px;font-size:.66em}.pg{padding:9px}.btn{width:100%;margin:3px 0}}
</style>
</head>

    showGuide:'👁 แสดงคำแนะนำ',hideGuide:'ซ่อน',

// ===== STATE =====
let curTab='pg0', curMod=0;
let lang = localStorage.getItem('lang') || 'en';
let done = JSON.parse(localStorage.getItem('ad') || '[]');
let cks = JSON.parse(localStorage.getItem('ac') || '{}');

const TABS = ['pg0','pg1','pg2','pg3','pg4','pg5','pg6'];

function init() {
  renderLangSel();
  applyLang();
  showTab('pg0');
  updProg();
}

function renderLangSel() {
  document.getElementById('langSel').innerHTML = LANGS.map(l =>
    `<button class="lang-btn ${lang===l.code?'on':''}" onclick="setLang('${l.code}')">${l.flag} ${l.name}</button>`
  ).join('');
}

function setLang(code) {
  lang = code;
  localStorage.setItem('lang', code);
  renderLangSel();
  applyLang();
  showTab(curTab);
}

function applyLang() {
  const t = T[lang];
  document.getElementById('hdTitle').textContent = t.title;
  document.getElementById('hdSub').textContent = t.sub;
  document.documentElement.lang = lang;
  renderTabs();
  updProg();
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map((id,i) =>
    `<div class="tab ${curTab===id?'on':''}" onclick="showTab('${id}')">${T[lang].tabs[i]}</div>`
  ).join('');
}

function showTab(id) {
  curTab = id;
  renderTabs();
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('show'));
  document.getElementById(id).classList.add('show');
  if(id==='pg0') renderRounds();
  else if(id==='pg1') renderMindmap();
  else if(id==='pg2') renderSG();
  else if(id==='pg3') renderSkills();
  else if(id==='pg4') renderHealth();
  else if(id==='pg5') renderSoft();
  else if(id==='pg6') renderRes();
}

function updProg() {
  const p = (done.length/10)*100;
  document.getElementById('pf').style.width = p + '%';
  document.getElementById('pt').textContent = `${done.length}/10 ${T[lang].progress} (${Math.round(p)}%)`;
}

function tog(id) {
  const e = document.getElementById(id);
  e.style.display = e.style.display==='block'?'none':'block';
}

function chk(k, el) {
  el.classList.toggle('d');
  cks[k] = el.classList.contains('d');
  localStorage.setItem('ac', JSON.stringify(cks));
}

function fin(i) {
  if(!done.includes(i)) {
    done.push(i);
    localStorage.setItem('ad', JSON.stringify(done));
  }
  updProg();
  renderRounds();
}

// ===== 10 ROUNDS (ALL IN ENGLISH) =====
const M = [
{id:1, w:1, t:"Self-Introduction", s:"Have a natural 2-minute conversation about yourself",
k:["Talk like chatting with a kind teacher - never memorize","Share: name, school, hobby, one thing you're proud of","Connect to why you want to study in Singapore","Keep it 1.5-2 minutes, natural, with emotion"],
q:[
{q:"Tell me about yourself.",
a:"Tell it naturally: Name → School → What you love most → 1 activity → Why Singapore. Example: 'Hi, I'm [Name] from [City]. I'm in grade [8/9] at [School]. I really love [subject/activity] because [genuine reason]. Outside school, I [activity]. I'm excited about Singapore because [specific reason].'",
tip:"Imagine introducing yourself to a friendly Principal. DON'T memorize word-for-word. Remember KEY POINTS and tell it differently each time.",

{q:"What do you like to do in your free time?",

n:"If they ask follow-up questions, that's a GOOD sign - they're interested. Keep talking like you're telling a close friend."}
],
ck:["Told my story 5 different ways (not identical)","Asked parents/teacher to listen and give feedback","Can speak confidently for 2 minutes without notes"]},

{q:"What do you know about this school?",

q:[

function renderRounds() {
  const t = T[lang];
  let h = `<div style="margin-bottom:12px">`;
  h += M.map((m,i) => `<button class="btn ${curMod===i?'btn-p':'btn-b'}" onclick="curMod=${i};renderRounds()" style="margin:2px">${done.includes(i)?'✅':''}R${m.id}</button>`).join('');
  h += `</div>`;
  const m = M[curMod];
  const wc = m.w===1?'b1':m.w===2?'b2':'b3';
  h += `<span class="badge ${wc}">${t.week} ${m.w}</span>${m.id>=8?`<span class="badge bx">${t.expert}</span>`:''}
  <h2 style="color:#0f2027;margin:4px 0;font-size:1.1em">${m.id>=8?'🔥':'📘'} Round ${m.id}: ${m.t}</h2>
  <p style="color:#666;font-size:.85em;margin-bottom:12px">${m.s}</p>`;
  h += `<div class="cd"><h3>📚 ${t.knowledge}</h3><ul>${m.k.map(k=>`<li>${k}</li>`).join('')}</ul></div>`;
  h += `<div class="cd"><h3>❓ ${t.questions}</h3>`;
  m.q.forEach((q,qi) => {
    h += `<div class="qb"><strong>Q: ${q.q}</strong></div>
    <button class="btn btn-o" onclick="tog('a${curMod}_${qi}')">${t.showGuide}</button>
    <div class="ab" id="a${curMod}_${qi}"><strong>${t.guideLabel}</strong><p>${q.a}</p></div>
    <div class="tb"><strong>${t.tipLabel}</strong> ${q.tip}</div>`;
    if(q.n) h += `<div class="nb"><strong>${t.naturalLabel}</strong> ${q.n}</div>`;
    h += `<hr class="hr">`;
  });
  h += `</div>`;
  h += `<div class="cd"><h3>✅ ${t.checklist}</h3><ul class="ck">${m.ck.map((c,ci)=>{
    const k = `${curMod}_${ci}`, d = cks[k]?'d':'';
    return `<li class="${d}" onclick="chk('${k}',this)">${c}</li>`;
  }).join('')}</ul></div>`;
  h += `<div style="text-align:center;margin-top:12px">`;
  if(!done.includes(curMod)) h += `<button class="btn btn-g" onclick="fin(${curMod})">${t.complete}</button>`;
  else h += `<span style="color:#2e7d32;font-weight:bold">${t.done}</span>`;
  if(curMod<9) h += ` <button class="btn btn-b" onclick="curMod=${curMod+1};renderRounds()">${t.next}</button>`;
  h += `</div>`;
  document.getElementById('pg0').innerHTML = h;
}

  document.getElementById('pg3').innerHTML = `
  <h2 style="color:#0f2027;margin-bottom:10px">🎯 Natural Interview Skills</h2>

  <li><strong>Practice:</strong> Imagine telling a story to your favorite English teacher</li>

  <li><strong>Dinner:</strong> Lighter, before 7pm</li>
  <li><strong>Snacks:</strong> Fruit, yogurt, nuts (instead of chips/candy)</li>
  <li><strong>Drinks:</strong> Mostly water. Limit sugary drinks</li>

  </ul></div>

  <li>If stressed: talk to parents, breathe deeply, journal</li>
  <li>Simple meditation: sit quietly 5 min, focus on breath</li>
  </ul></div>
